version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_backup_demo
    restart: unless-stopped
    
    env_file:
      - .env
    
    environment:
      - TZ=UTC
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups
      - ./scripts:/scripts:ro
    
    ports:
      - "5432:5432"
    
    networks:
      - backup_network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: postgres_backup_volume

networks:
  backup_network:
    name: postgres_backup_network
    driver: bridge